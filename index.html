<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Web Components</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="page">
      <h1>Creacion de Web Components</h1>
      <p>
        Base para poder practicar crear web components y crear ramas en el repositorio (texto de relleno para que sea un parrafo mas largo)
      </p>
      <button type="button" id="action-button">Boton</button>

      <numeric-field value="10"></numeric-field>

      <my-slider min="0" max="100" value="50" step="5" style="max-width: 300px;">
        <slider-label>0&#8451;</slider-label>
        <slider-label position="25">25&#8451;</slider-label>
        <slider-label position="50">50&#8451;</slider-label>
        <slider-label position="75">75&#8451;</slider-label>
        <slider-label position="100">100&#8451;</slider-label>
      </my-slider>
    
      <my-switch>
        <span slot="checked-message">On</span>
        <span slot="unchecked-message">Off</span>
        <label>Captions:</label>
      </my-switch>

      <my-horizontal-scroll>
        <my-card>Card 1</my-card>
        <my-card>Card 2</my-card>
        <my-card>Card 3</my-card>
        <my-card>Card 4</my-card>
        <my-card>Card 5</my-card>
      </my-horizontal-scroll>
    </main>



    <template id="slider-template">
      <style>
        :host {
          display: block;
        }
    
        .slider {
          width: 100%;
        }
    
        input[type="range"] {
          width: 100%;
          cursor: pointer;
        }
    
        .labels {
          position: relative;
          height: 1.25rem;
          margin-top: 0.25rem;
        }
      </style>
      <div class="slider">
        <input type="range" />
        <div class="labels">
          <slot></slot>
        </div>
      </div>
    </template>

    <script src="main.js"></script>

    <script src="numericField.js"></script>
    <script src="slider.js"></script>
    <script src="switch.js"></script>
    <script src="horizontal_scroll.js"></script>
  </body>
</html>
